name: CI

# Windows is the gate (the project is Windows-first). The macOS job exists to
# COMPILE-CHECK the macOS backends, but the C++ SWELL port (the UI shim) is still
# a work in progress (see the "macOS backend" task), so it is marked
# `continue-on-error` — it runs and reports, but does NOT fail the overall build.
# Flip that off once the mac build is green.

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  windows:
    name: Windows — build, test, clippy
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --all-targets
      - name: Test
        run: cargo test
      - name: Clippy
        run: cargo clippy --all-targets

  macos:
    name: macOS — build (validates the mac backends)
    runs-on: macos-latest
    # WIP: the SWELL C++ port isn't done yet, so don't let it fail the build.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # swell_resgen.php generates the native dialog/menu tables from the .rc.
      - name: Install PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
      # SWELL headers + the resource generator live in WDL.
      - name: Fetch WDL (SWELL)
        run: git clone --depth 1 https://github.com/justinfrankel/WDL.git vendor/WDL
      - name: Build
        env:
          # reaper-rs uses bindgen (needs libclang); Xcode's Command Line Tools ship it.
          LIBCLANG_PATH: /Library/Developer/CommandLineTools/usr/lib
        run: cargo build
      # Tests are host-independent (DSP, parsing, adapters); run them here too.
      - name: Test
        env:
          LIBCLANG_PATH: /Library/Developer/CommandLineTools/usr/lib
        run: cargo test
