name: CI

# Windows is the primary target; the macOS job compile-checks the SWELL/mac
# backends. The mac build now compiles + links, so it is a hard gate again
# (runtime behaviour on macOS is still unvalidated — no mac tester yet).

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  windows:
    name: Windows — build, test, clippy
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --all-targets
      - name: Test
        run: cargo test
      - name: Clippy
        run: cargo clippy --all-targets

  macos:
    name: macOS — build (validates the mac backends)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # swell_resgen.php generates the native dialog/menu tables from the .rc.
      - name: Install PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
      # SWELL headers + the resource generator live in WDL.
      - name: Fetch WDL (SWELL)
        run: git clone --depth 1 https://github.com/justinfrankel/WDL.git vendor/WDL
      - name: Build (host arch)
        env:
          # reaper-rs uses bindgen (needs libclang); Xcode's Command Line Tools ship it.
          LIBCLANG_PATH: /Library/Developer/CommandLineTools/usr/lib
        run: cargo build
      # The release ships a UNIVERSAL (arm64 + x86_64) dylib so it loads whether
      # REAPER runs native Apple Silicon, on Intel, or under Rosetta. The runner is
      # arm64, so cross-compile the x86_64 slice here to catch breakage before a
      # release rather than during it.
      - name: Cross-compile x86_64 slice (universal-build check)
        env:
          LIBCLANG_PATH: /Library/Developer/CommandLineTools/usr/lib
        run: |
          rustup target add x86_64-apple-darwin
          cargo build --target x86_64-apple-darwin
      # Tests are host-independent (DSP, parsing, adapters); run them here too.
      - name: Test
        env:
          LIBCLANG_PATH: /Library/Developer/CommandLineTools/usr/lib
        run: cargo test
