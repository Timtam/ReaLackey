name: Release

# Manual release: pick a version, and this builds the artifacts, rolls the
# CHANGELOG's [Unreleased] section into that version, tags it, and publishes a
# GitHub release with the built binaries and those changelog entries as the
# notes. Add entries under "## [Unreleased]" in CHANGELOG.md as you go.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, e.g. 0.2.0 (no leading v)"
        required: true
        type: string

# Never run two releases at once (they both push to main + create a tag).
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write # push the release commit/tag and create the GitHub release

jobs:
  build:
    name: Build (${{ matrix.name }})
    strategy:
      fail-fast: true
      matrix:
        include:
          - name: windows
            os: windows-latest
            src: target/release/reaper_realackey.dll
            asset: reaper_realackey.dll
          - name: macos
            os: macos-latest
            # Built as a universal binary below; cargo prefixes the cdylib with
            # `lib`, REAPER wants reaper_*.dylib.
            asset: reaper_realackey.dylib
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install PHP (macOS SWELL resgen)
        if: matrix.name == 'macos'
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
      - name: Fetch WDL / SWELL (macOS)
        if: matrix.name == 'macos'
        run: git clone --depth 1 https://github.com/justinfrankel/WDL.git vendor/WDL

      - name: Build (Windows)
        if: matrix.name == 'windows'
        run: cargo build --release

      # Universal (arm64 + x86_64) so the extension loads whether REAPER runs as
      # native Apple Silicon, on an Intel Mac, or under Rosetta. The runner is
      # arm64; build both slices and `lipo` them together.
      - name: Build universal dylib (macOS)
        if: matrix.name == 'macos'
        env:
          LIBCLANG_PATH: /Library/Developer/CommandLineTools/usr/lib
        run: |
          set -euo pipefail
          rustup target add aarch64-apple-darwin x86_64-apple-darwin
          cargo build --release --target aarch64-apple-darwin
          cargo build --release --target x86_64-apple-darwin
          mkdir -p dist
          lipo -create -output "dist/${{ matrix.asset }}" \
            target/aarch64-apple-darwin/release/libreaper_realackey.dylib \
            target/x86_64-apple-darwin/release/libreaper_realackey.dylib
          lipo -info "dist/${{ matrix.asset }}"

      # Developer ID sign + notarize so macOS loads it without the user clearing
      # quarantine. Runs only when the signing secrets are present; without them it
      # falls back to an ad-hoc signature (the universal binary still works, but
      # users must run `xattr -dr com.apple.quarantine`). See docs/macos-notarization.md.
      - name: Sign & notarize (macOS)
        if: matrix.name == 'macos'
        env:
          ASSET: ${{ matrix.asset }}
          CERT_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          NOTARY_KEY_BASE64: ${{ secrets.MACOS_NOTARY_KEY_P8_BASE64 }}
          NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
        run: |
          set -euo pipefail
          if [ -z "${CERT_P12_BASE64:-}" ]; then
            echo "::warning::No macOS signing secrets set — ad-hoc signing only. Users must run: xattr -dr com.apple.quarantine <dylib>. See docs/macos-notarization.md to set up notarization."
            codesign --force --sign - "dist/$ASSET"
            codesign -dvv "dist/$ASSET" 2>&1 || true
            exit 0
          fi

          # --- import the Developer ID cert into a throwaway keychain ---
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PW="$(openssl rand -base64 24)"
          printf '%s' "$CERT_P12_BASE64"   | base64 -D > "$RUNNER_TEMP/cert.p12"
          printf '%s' "$NOTARY_KEY_BASE64" | base64 -D > "$RUNNER_TEMP/notary.p8"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN"

          # --- sign with the Developer ID identity (hardened runtime + timestamp) ---
          SIGN_ID="$(security find-identity -v -p codesigning "$KEYCHAIN" | awk '/Developer ID Application/ {print $2; exit}')"
          if [ -z "$SIGN_ID" ]; then
            echo "::error::No 'Developer ID Application' identity found in the imported certificate."
            exit 1
          fi
          codesign --force --timestamp --options runtime --sign "$SIGN_ID" "dist/$ASSET"
          codesign --verify --strict --verbose=2 "dist/$ASSET"

          # --- notarize (a bare .dylib can't be stapled; submit a zip, Gatekeeper
          #     verifies online on first load) ---
          ditto -c -k "dist/$ASSET" "$RUNNER_TEMP/notarize.zip"
          if ! xcrun notarytool submit "$RUNNER_TEMP/notarize.zip" \
                 --key "$RUNNER_TEMP/notary.p8" --key-id "$NOTARY_KEY_ID" \
                 --issuer "$NOTARY_ISSUER_ID" --wait --timeout 30m 2>&1 | tee "$RUNNER_TEMP/notary.log"; then
            SID="$(awk '/id:/ {print $2; exit}' "$RUNNER_TEMP/notary.log" || true)"
            [ -n "$SID" ] && xcrun notarytool log "$SID" --key "$RUNNER_TEMP/notary.p8" \
              --key-id "$NOTARY_KEY_ID" --issuer "$NOTARY_ISSUER_ID" || true
            echo "::error::Notarization failed."
            exit 1
          fi
          echo "Signed + notarized. (A loose .dylib can't be stapled; Gatekeeper checks online on first load.)"
          rm -f "$RUNNER_TEMP/cert.p12" "$RUNNER_TEMP/notary.p8"

      - name: Stage asset (Windows)
        if: matrix.name == 'windows'
        shell: bash
        run: |
          mkdir -p dist
          cp "${{ matrix.src }}" "dist/${{ matrix.asset }}"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Roll CHANGELOG [Unreleased] -> ${{ inputs.version }}
        run: |
          python3 .github/roll_changelog.py "${{ inputs.version }}" "$(date -u +%Y-%m-%d)" > release-notes.md

      - name: Set Cargo.toml version
        run: sed -i 's/^version = ".*"/version = "${{ inputs.version }}"/' Cargo.toml

      - name: Commit, tag, push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md Cargo.toml
          git commit -m "Release v${{ inputs.version }}"
          git tag "v${{ inputs.version }}"
          git push origin HEAD:main
          git push origin "v${{ inputs.version }}"

      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ inputs.version }}" \
            --title "ReaLackey v${{ inputs.version }}" \
            --notes-file release-notes.md \
            dist/*
