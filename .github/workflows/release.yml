name: Release

# Manual release: pick a version, and this builds the artifacts, rolls the
# CHANGELOG's [Unreleased] section into that version, tags it, and publishes a
# GitHub release with the built binaries and those changelog entries as the
# notes. Add entries under "## [Unreleased]" in CHANGELOG.md as you go.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, e.g. 0.2.0 (no leading v)"
        required: true
        type: string

# Never run two releases at once (they both push to main + create a tag).
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write # push the release commit/tag and create the GitHub release

jobs:
  build:
    name: Build (${{ matrix.name }})
    strategy:
      fail-fast: true
      matrix:
        include:
          - name: windows
            os: windows-latest
            src: target/release/reaper_realackey.dll
            asset: reaper_realackey.dll
          - name: macos
            os: macos-latest
            # Built as a universal binary below; cargo prefixes the cdylib with
            # `lib`, REAPER wants reaper_*.dylib.
            asset: reaper_realackey.dylib
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install PHP (macOS SWELL resgen)
        if: matrix.name == 'macos'
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
      - name: Fetch WDL / SWELL (macOS)
        if: matrix.name == 'macos'
        run: git clone --depth 1 https://github.com/justinfrankel/WDL.git vendor/WDL

      - name: Build (Windows)
        if: matrix.name == 'windows'
        run: cargo build --release

      # Universal (arm64 + x86_64) so the extension loads whether REAPER runs as
      # native Apple Silicon, on an Intel Mac, or under Rosetta, and Developer-ID
      # signed + notarized so macOS loads it without the user clearing quarantine.
      # Without the signing secrets it falls back to an ad-hoc signature. Shared
      # with the macos-notarization-test workflow. See docs/macos-notarization.md.
      - name: Build, sign & notarize (macOS)
        if: matrix.name == 'macos'
        env:
          LIBCLANG_PATH: /Library/Developer/CommandLineTools/usr/lib
          ASSET: ${{ matrix.asset }}
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_NOTARY_KEY_P8_BASE64: ${{ secrets.MACOS_NOTARY_KEY_P8_BASE64 }}
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
        run: bash .github/scripts/build-macos-universal.sh

      - name: Stage asset (Windows)
        if: matrix.name == 'windows'
        shell: bash
        run: |
          mkdir -p dist
          cp "${{ matrix.src }}" "dist/${{ matrix.asset }}"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Roll CHANGELOG [Unreleased] -> ${{ inputs.version }}
        run: |
          python3 .github/roll_changelog.py "${{ inputs.version }}" "$(date -u +%Y-%m-%d)" > release-notes.md

      - name: Set Cargo.toml version
        run: sed -i 's/^version = ".*"/version = "${{ inputs.version }}"/' Cargo.toml

      - name: Commit, tag, push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md Cargo.toml
          git commit -m "Release v${{ inputs.version }}"
          git tag "v${{ inputs.version }}"
          git push origin HEAD:main
          git push origin "v${{ inputs.version }}"

      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ inputs.version }}" \
            --title "ReaLackey v${{ inputs.version }}" \
            --notes-file release-notes.md \
            dist/*
